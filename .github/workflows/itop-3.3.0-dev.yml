name: Docker Image CI for itop:3.3.0-dev

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAME: itop
  VERSION: 3.3.0-dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout itop develop branch
        uses: actions/checkout@v6
        with:
          repository: 'Combodo/iTop'
          ref: 'develop'
          path: 'docker/3.3.0-dev/itop'

      - name: List files
        run: |
          echo $GITHUB_WORKSPACE
          pwd
          ls -la

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/3.3.0-dev
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.NAME }}:${{ env.VERSION }}
          outputs: |
            type=image,compression=zstd,compression-level=6,force-compression=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

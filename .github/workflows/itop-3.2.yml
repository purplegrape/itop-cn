name: Docker Image CI for itop:3.2

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAME:     itop
  VERSION: 3.2

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: "{{defaultContext}}:docker/3.2"
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.NAME }}:latest
          outputs: |
            type=image,compression=zstd,force-compression=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

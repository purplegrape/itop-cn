name: Docker Image CI for itop:latest-dev

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  NAME: itop
  VERSION: 3.3.0-dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout itop develop branch
        uses: actions/checkout@v6
        with:
          repository: 'Combodo/iTop'
          path: 'docker/dev/itop'
          ref: 'develop'

      - name: List files
        run: |
          pwd
          ls -la
          ls -la docker/dev/itop/
          rm -rf docker/dev/itop/.*
          rm -rf docker/dev/itop/tests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./docker/dev
          file: ./docker/dev/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.actor }}/${{ env.NAME }}:${{ env.VERSION }}
          outputs: |
            type=image,compression=zstd,force-compression=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
